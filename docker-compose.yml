services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: spoor
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: spoor
    volumes:
      - spoor-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spoor -d spoor"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:${PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgres://spoor:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/spoor
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}
      BETTER_AUTH_URL: ${APP_URL:-http://localhost:3000}
      APP_URL: ${APP_URL:-http://localhost:3000}
      SPOOR_HASH_SECRET: ${SPOOR_HASH_SECRET:?SPOOR_HASH_SECRET must be set}
      PORT: "3000"
      NODE_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/login > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  spoor-data:
