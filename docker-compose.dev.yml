services:
  postgres:
    image: postgres:16-alpine
    # No container_name / fixed host port on purpose: Compose isolates resources
    # per project (the worktree dir name), and the host port is auto-assigned so
    # many worktrees can run `pnpm dev` at once. scripts/dev.sh reads the port
    # back and builds DATABASE_URL. See .env.example.
    environment:
      POSTGRES_USER: spoor
      POSTGRES_PASSWORD: spoor
      POSTGRES_DB: spoor
    ports:
      - "5432"
    volumes:
      - spoor-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spoor -d spoor"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  spoor-dev-data:
